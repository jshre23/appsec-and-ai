<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(120deg, #f6d365 0%, #fda085 100%); font-family: 'Segoe UI', Arial, sans-serif; }
        .log-card { background: #fff; border-radius: 1.2rem; box-shadow: 0 4px 24px #fda08555; padding: 2.5rem; margin-top: 2rem; }
        .section-title { color: #fda085; font-weight: 700; margin-bottom: 1.2rem; }
        .table-responsive { margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
      <div class="log-card">
        <h1 class="mb-4"><i class="fa fa-file-alt text-warning icon"></i> Prediction Logs</h1>
        <div class="table-responsive">
          <table class="table table-bordered table-striped align-middle shadow-sm" id="logsTable">
            <thead class="table-light align-middle text-center">
              <tr>
                <th>Timestamp</th>
                <th>URL</th>
                <th>Payload</th>
                <th>Prediction</th>
                <th>Reason</th>
                <th>Attack Type</th>
              </tr>
            </thead>
            <tbody id="logsTableBody">
              <!-- Dynamic rows will be injected by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <script>
      function updateLogs() {
        fetch('/logs?json=1')
          .then(r => r.json())
          .then(data => {
            const tbody = document.getElementById('logsTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            if (data && data.success && Array.isArray(data.logs)) {
              data.logs.forEach(log => {
                tbody.innerHTML += `
                  <tr class="text-center align-middle">
                    <td>${log.timestamp || '-'}</td>
                    <td>${log.url || '-'}</td>
                    <td>${log.request_body || '-'}</td>
                    <td>${log.label || '-'}</td>
                    <td>${log.reason || '-'}</td>
                    <td>${log.attack_type || '-'}</td>
                  </tr>
                `;
              });
            } else {
              tbody.innerHTML = '<tr><td colspan="6" class="text-center">No logs found.</td></tr>';
            }
          });
      }
      setInterval(updateLogs, 3000);
      document.addEventListener('DOMContentLoaded', updateLogs);
    </script>
</body>
</html>

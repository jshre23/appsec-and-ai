<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Input - AI Web Security Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      body {
        background: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
        min-height: 100vh;
        font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
        position: relative;
      }
      .glass-card {
        background: rgba(255,255,255,0.85);
        border-radius: 2rem;
        box-shadow: 0 8px 32px 0 rgba(31,38,135,0.18);
        backdrop-filter: blur(8px);
        border: 1.5px solid rgba(255,255,255,0.25);
        overflow: hidden;
        margin-top: 40px;
        margin-bottom: 40px;
      }
      .manual-header {
        background: linear-gradient(90deg, #f6d365 0%, #fda085 100%);
        color: #fff;
        font-size: 2.2rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        padding: 2rem 0 1.2rem 0;
        border-radius: 2rem 2rem 0 0;
        box-shadow: 0 4px 24px #fda08555;
        text-shadow: 0 2px 8px #fda08555;
        text-align: center;
      }
      .form-label { font-weight: 600; color: #fda085; }
      .form-control, .form-select {
        border-radius: 0.9rem;
        border: 1.5px solid #fda085;
        background: #fff8f0;
        font-size: 1.08em;
      }
      .btn-primary {
        background: #fda085;
        border-radius: 1.2em;
        font-weight: 600;
        letter-spacing: 0.03em;
        border: none;
        padding: 0.7em 2.2em;
        font-size: 1.1em;
        box-shadow: 0 2px 8px #fda08533;
      }
      .btn-primary:hover {
        background: #f6d365;
        color: #fff;
      }
      .btn-link { font-weight: 600; color: #fda085; }
      .btn-link:hover { color: #f6d365; }
      #result { margin-top: 30px; font-size: 1.1em; }
      footer {
        position: fixed;
        left: 0; right: 0; bottom: 0;
        background: linear-gradient(90deg, #f6d365 0%, #fda085 100%);
        color: #fff;
        text-align: center;
        padding: 0.5rem 0;
        font-size: 1.1rem;
        letter-spacing: 0.04em;
        z-index: 100;
        box-shadow: 0 -2px 16px #fda08533;
      }
    </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-xl-7 col-lg-9">
        <div class="glass-card">
          <div class="manual-header">
            <i class="fa fa-keyboard me-2"></i>Manual Prediction Input
          </div>
          <div class="card-body p-5">
            <form id="manualForm">
              <div class="mb-3">
                <label class="form-label">URL</label>
                <input type="text" class="form-control" name="URL" required placeholder="https://example.com/page?param=value">
              </div>
              <div class="mb-3">
                <label class="form-label">HTTP Method</label>
                <select class="form-select" name="Method">
                  <option>GET</option>
                  <option>POST</option>
                  <option>PUT</option>
                  <option>DELETE</option>
                  <option>PATCH</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">User-Agent</label>
                <input type="text" class="form-control" name="User-Agent" placeholder="Mozilla/5.0 ...">
              </div>
              <div class="mb-3">
                <label class="form-label">Host</label>
                <input type="text" class="form-control" name="host" placeholder="example.com">
              </div>
              <div class="mb-3">
                <label class="form-label">Content-Type</label>
                <input type="text" class="form-control" name="content-type" value="application/x-www-form-urlencoded">
              </div>
              <div class="mb-3">
                <label class="form-label">Request Body</label>
                <textarea class="form-control" name="request_body" rows="3" placeholder="param1=value1&param2=value2"></textarea>
              </div>
              <button type="submit" class="btn btn-primary btn-lg w-100 mb-2"><i class="fa fa-magic"></i> Predict</button>
              <a href="/" class="btn btn-link btn-lg w-100"><i class="fa fa-home"></i> Back to Home</a>
            </form>
            <div id="result"></div>
          </div>
        </div>
      </div>
    </div>
    <footer>
      <span>🚀 AI Web Security Dashboard &copy; 2025 | <i class="fa fa-heart text-danger"></i> Modern UI</span>
    </footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('manualForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var form = document.getElementById('manualForm');
      var formData = {};
      Array.from(form.elements).forEach(function(el) {
        if (el.name) formData[el.name] = el.type === 'checkbox' ? el.checked : el.value;
      });
      fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      })
      .then(response => {
        if (response.redirected) {
          window.location.href = response.url;
          return;
        }
        return response.json();
      })
      .then(data => {
        if (data && data.success) {
          let icon = data.prediction === 'malicious' ? '<i class="fa fa-bug text-danger"></i>' : '<i class="fa fa-shield-alt text-success"></i>';
          let color = data.prediction === 'malicious' ? 'text-danger' : 'text-success';
          // Animate result
          let resultDiv = document.getElementById('result');
          resultDiv.innerHTML = `<strong>Prediction:</strong> ${icon} <span class="${color}">${data.prediction}</span>`;
          resultDiv.classList.add('animate__animated', 'animate__fadeIn');
          setTimeout(() => resultDiv.classList.remove('animate__animated', 'animate__fadeIn'), 1200);
        } else if (data && !data.success) {
          document.getElementById('result').innerHTML = '<span class="text-danger">' + (data.error || 'Prediction failed') + '</span>';
        }
      })
      .catch(err => {
        document.getElementById('result').innerHTML = '<span class="text-danger">Server error: ' + err + '</span>';
      });
      return false;
    });
  </script>
</body>
</html>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulate Prediction - AI Web Security Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        background: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
        font-family: 'Segoe UI', Arial, sans-serif;
      }
      .glass-card {
        background: #fff;
        border-radius: 2rem;
        box-shadow: 0 8px 32px 0 rgba(31,38,135,0.18);
        padding: 2rem;
        margin-top: 2rem;
      }
      .simulate-header {
        color: #333;
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        text-align: center;
      }
      .form-label { font-weight: 600; color: #fda085; }
      .form-control, .form-select {
        border-radius: 0.9rem;
        border: 1.5px solid #fda085;
        background: #fff7f0;
        font-size: 1.08em;
      }
      .btn-primary {
        background: #fda085;
        border-radius: 1.2em;
        font-weight: 600;
        letter-spacing: 0.03em;
        border: none;
        padding: 0.7em 2.2em;
        font-size: 1.1em;
        box-shadow: 0 2px 8px #fda08533;
      }
      .btn-primary:hover {
        background: #f6d365;
        color: #fff;
      }
      #result { margin-top: 30px; font-size: 1.1em; }
      .btn-link {
        color: #fda085;
        font-weight: 600;
        font-size: 1.1em;
        text-decoration: none;
        border-radius: 1.2em;
        transition: background 0.2s, color 0.2s;
      }
      .btn-link:hover {
        background: #f6d365;
        color: #fff;
      }
      footer {
        position: fixed;
        left: 0; right: 0; bottom: 0;
        background: linear-gradient(90deg, #f6d365 0%, #fda085 100%);
        color: #fff;
        text-align: center;
        padding: 0.5rem 0;
        font-size: 1.1rem;
        letter-spacing: 0.04em;
        z-index: 100;
        box-shadow: 0 -2px 16px #fda08533;
      }
    </style>
</head>
<body>
  <div class="container">
    <div class="glass-card">
      <div class="simulate-header">
        <i class="fa fa-magic text-primary"></i> Simulate Prediction
      </div>
      <form id="predictForm">
        <div class="mb-3">
          <label class="form-label">Request URL</label>
          <input type="text" class="form-control" name="URL" placeholder="http://example.com/api?param=value" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Request Body</label>
          <textarea name="request_body" class="form-control" placeholder="Raw HTTP request body or payload..."></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">User-Agent</label>
          <input type="text" class="form-control" name="User-Agent" placeholder="Mozilla/5.0" value="Mozilla/5.0">
        </div>
        <div class="mb-3">
          <label class="form-label">HTTP Method</label>
          <input type="text" class="form-control" name="Method" placeholder="GET" value="GET">
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-2"><i class="fa fa-magic"></i> Predict</button>
      </form>
      <div id="result" class="mt-3"></div>
    </div>
  </div>
  <footer>
    <span>🚀 AI Web Security Dashboard &copy; 2025 | <i class="fa fa-heart text-danger"></i> Modern UI</span>
  </footer>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(function() {
      $('#predictForm').on('submit', function(e){
        e.preventDefault();
        $("#result").html('<span class="text-info"><i class="fa fa-spinner fa-spin"></i> Sending prediction...</span>');
        const data = {};
        $(this).serializeArray().forEach(item => data[item.name] = item.value);
        $.ajax({
          url: '/predict',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify(data),
          success: function(resp, status, xhr){
            if (xhr && xhr.responseURL && xhr.responseURL.includes('/result')) {
              window.location.href = xhr.responseURL;
              return;
            }
            let icon = resp.prediction === 'malicious' ? '<i class="fa fa-bug text-danger"></i>' : '<i class="fa fa-shield-alt text-success"></i>';
            let color = resp.prediction === 'malicious' ? 'text-danger' : 'text-success';
            $('#result').html(`<strong>Prediction:</strong> ${icon} <span class="${color}">${resp.prediction}</span><br><strong>Reason:</strong> ${resp.reason}<br><strong>Attack Type:</strong> ${resp.attack_type}`);
          },
          error: function(xhr){
            let msg = (xhr.responseJSON && xhr.responseJSON.error) ? xhr.responseJSON.error : 'Unknown error';
            $('#result').html(`<span class="text-danger"><i class="fa fa-exclamation-triangle"></i> Error: ${msg}</span>`);
          }
        });
      });
    });
  </script>
</body>
</html>
